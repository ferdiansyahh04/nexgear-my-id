name: NexGear CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3']

    # MySQL service so the full PHPUnit suite (Feature + DB-backed Unit tests)
    # can run, not just the DB-free UnitFast subset.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: nexgear_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      # Point CI4's `tests` database group at the MySQL service above.
      database.tests.hostname: 127.0.0.1
      database.tests.database: nexgear_test
      database.tests.username: root
      database.tests.password: ''
      database.tests.DBDriver: MySQLi
      database.tests.port: 3306

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, mysqli, pdo_mysql, gd
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root --silent; then
              echo "MySQL is up"; break
            fi
            echo "Waiting for MySQL... ($i)"; sleep 2
          done

      - name: Provision test database
        # Creates nexgear_test (if missing) and imports the canonical schema
        # from database/nexgear_store.sql.
        run: php spark test:setup

      - name: Run full PHPUnit suite
        # Unit + Feature cover the whole codebase once. (UnitFast is a DB-free
        # subset that overlaps Unit, so it's excluded here to avoid double runs.)
        run: vendor/bin/phpunit --testsuite Unit,Feature --testdox

  deploy:
    name: Deploy to production VPS
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Only deploy on direct push to main (not PRs).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      # Serialise deploys so two pushes in a row don't race each other.
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          # Default to 2278 if VPS_SSH_PORT secret is missing/empty — drone-ssh
          # silently falls back to 22 otherwise, which would i/o-timeout.
          port: ${{ secrets.VPS_SSH_PORT || '2278' }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR=/var/www/nexgear-store

            echo '=== Pulling latest commit ==='
            cd "$APP_DIR"
            sudo -u www-data git fetch --quiet origin main
            sudo -u www-data git reset --hard origin/main

            echo '=== Installing composer dependencies (production) ==='
            sudo -u www-data \
              COMPOSER_ALLOW_SUPERUSER=1 \
              composer install --no-dev --optimize-autoloader --no-interaction --no-progress --prefer-dist

            echo '=== Running database migrations ==='
            # Idempotent — CI4 tracks applied migrations, so re-running is a
            # no-op once everything is up to date. Required for schema changes
            # (e.g. the cart payment columns) to land before the app serves them.
            # -v prints each migration so failures are visible in the deploy log.
            sudo -u www-data php spark migrate --all -v || echo "WARN: migrate exited non-zero — continuing"

            echo '=== Migration status (for visibility) ==='
            sudo -u www-data php spark migrate:status || true

            echo '=== Importing Noir Gear catalogue (keyboards & mice) ==='
            # Idempotent — upserts by name and skips already-downloaded images,
            # so re-running on every deploy is safe and cheap. The first run
            # populates the etalase from the JSON shipped in the repo.
            sudo -u www-data php spark etalase:import-noirgear || echo "WARN: import-noirgear exited non-zero — continuing"

            echo '=== Importing Linsoul catalogue (in-ear monitors) ==='
            # Same idempotent upsert-by-name pattern. Populates the headsets
            # category with curated IEMs from the JSON shipped in the repo.
            sudo -u www-data php spark etalase:import-linsoul || echo "WARN: import-linsoul exited non-zero — continuing"

            echo '=== Importing deskmat catalogue (mousepads) ==='
            # Curated deskmats from Press Play & Noir Gear into the mousepads
            # category. Idempotent upsert-by-name, same as the other importers.
            sudo -u www-data php spark etalase:import-deskmat || echo "WARN: import-deskmat exited non-zero — continuing"

            echo '=== Clearing app cache (after import so stale listings get evicted) ==='
            # The unfiltered storefront listing is page-cached for 5 minutes
            # (ProductController::index). If we cleared the cache before the
            # import, requests landing during the import would re-cache the
            # half-populated state. Clearing afterwards guarantees the next
            # request rebuilds the cache from the final dataset.
            sudo -u www-data php spark cache:clear

            echo '=== Reloading PHP-FPM (zero-downtime, picks up opcache reset) ==='
            systemctl reload php8.3-fpm

            echo '=== Sanity check ==='
            HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 10 https://nexgear.my.id/login || echo 000)
            if [ "$HTTP_CODE" != "200" ]; then
                echo "WARN: /login returned $HTTP_CODE (expected 200)"
                exit 1
            fi
            echo "[OK] /login returned $HTTP_CODE — deploy successful"

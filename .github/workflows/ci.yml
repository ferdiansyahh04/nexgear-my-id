name: NexGear CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nexgear_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, mysqli, pdo_mysql, gd
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Setup environment
        run: |
          cp .env.example .env
          sed -i 's|^CI_ENVIRONMENT.*|CI_ENVIRONMENT = testing|' .env
          sed -i 's|^database.default.database.*|database.default.database = nexgear_test|' .env
          sed -i 's|^database.default.password.*|database.default.password = root|' .env

      - name: Provision test database
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS nexgear_test CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;"
          mysql -h 127.0.0.1 -u root -proot nexgear_test < database/nexgear_store.sql

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --testdox

  deploy:
    name: Deploy to production VPS
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Only deploy on direct push to main (not PRs).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      # Serialise deploys so two pushes in a row don't race each other.
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR=/var/www/nexgear-store

            echo '=== Pulling latest commit ==='
            cd "$APP_DIR"
            sudo -u www-data git fetch --quiet origin main
            sudo -u www-data git reset --hard origin/main

            echo '=== Installing composer dependencies (production) ==='
            sudo -u www-data \
              COMPOSER_ALLOW_SUPERUSER=1 \
              composer install --no-dev --optimize-autoloader --no-interaction --no-progress --prefer-dist

            echo '=== Clearing app cache ==='
            sudo -u www-data php spark cache:clear

            echo '=== Reloading PHP-FPM (zero-downtime, picks up opcache reset) ==='
            systemctl reload php8.3-fpm

            echo '=== Sanity check ==='
            HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 10 https://nexgear.my.id/login || echo 000)
            if [ "$HTTP_CODE" != "200" ]; then
                echo "WARN: /login returned $HTTP_CODE (expected 200)"
                exit 1
            fi
            echo "[OK] /login returned $HTTP_CODE — deploy successful"

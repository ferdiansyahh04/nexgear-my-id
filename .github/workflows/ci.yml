name: NexGear CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, mysqli, pdo_mysql, gd
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit fast suite (DB-free)
        # Full Unit + Feature suites need a wired-up database; the UnitFast
        # subset (CartService, OrderStatusService) covers pure business logic
        # without DB and gives high-signal coverage for CI gating.
        run: vendor/bin/phpunit --testsuite UnitFast --testdox

  deploy:
    name: Deploy to production VPS
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Only deploy on direct push to main (not PRs).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      # Serialise deploys so two pushes in a row don't race each other.
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Verify SSH key secret format (no key value leaked)
        env:
          KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          PORT: ${{ secrets.VPS_SSH_PORT }}
          USER: ${{ secrets.VPS_USER }}
        run: |
          echo "HOST set: $([ -n "$HOST" ] && echo yes || echo no)"
          echo "PORT set: $([ -n "$PORT" ] && echo yes || echo no) (value: '$PORT')"
          echo "USER set: $([ -n "$USER" ] && echo yes || echo no)"
          if [ -z "$KEY" ]; then
            echo "::error::VPS_SSH_KEY secret is empty"; exit 1
          fi
          echo "Key length: ${#KEY} chars"
          echo "First line: $(echo "$KEY" | head -1)"
          echo "Last line: $(echo "$KEY" | tail -1)"
          echo "Line count: $(echo "$KEY" | wc -l)"
          # Check for Windows line endings (CRLF)
          if echo "$KEY" | head -1 | grep -q $'\r'; then
            echo "::error::Key has Windows-style CRLF line endings — re-paste from a Unix-friendly editor"
            exit 1
          fi
          # Try fingerprinting it (writes to a tmp file then ssh-keygen -lf)
          TMP=$(mktemp)
          printf '%s\n' "$KEY" > "$TMP"
          chmod 600 "$TMP"
          if ssh-keygen -lf "$TMP" 2>&1; then
            echo '[OK] Key parses correctly'
          else
            echo '::error::Key cannot be parsed by ssh-keygen — likely truncated or malformed'
            cat "$TMP" | head -3
            exit 1
          fi
          rm -f "$TMP"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          # Coerce port to int — secrets are always strings, drone-ssh sometimes
          # silently falls back to 22 if it can't parse. Default 2278 keeps us
          # safe even if VPS_SSH_PORT is missing/typo'd.
          port: ${{ secrets.VPS_SSH_PORT || '2278' }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          debug: true
          script: |
            set -euo pipefail
            APP_DIR=/var/www/nexgear-store

            echo '=== Pulling latest commit ==='
            cd "$APP_DIR"
            sudo -u www-data git fetch --quiet origin main
            sudo -u www-data git reset --hard origin/main

            echo '=== Installing composer dependencies (production) ==='
            sudo -u www-data \
              COMPOSER_ALLOW_SUPERUSER=1 \
              composer install --no-dev --optimize-autoloader --no-interaction --no-progress --prefer-dist

            echo '=== Clearing app cache ==='
            sudo -u www-data php spark cache:clear

            echo '=== Reloading PHP-FPM (zero-downtime, picks up opcache reset) ==='
            systemctl reload php8.3-fpm

            echo '=== Sanity check ==='
            HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 10 https://nexgear.my.id/login || echo 000)
            if [ "$HTTP_CODE" != "200" ]; then
                echo "WARN: /login returned $HTTP_CODE (expected 200)"
                exit 1
            fi
            echo "[OK] /login returned $HTTP_CODE — deploy successful"

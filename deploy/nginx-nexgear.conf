# NexGear Storefront — Nginx server block.
#
# Goals:
#   • Serve from /var/www/nexgear-store/public (CodeIgniter front controller)
#   • Co-exist with OpenClaw on the same host (different server_name)
#   • Hand .php to PHP-FPM 8.3 over the unix socket
#   • Block any PHP execution under /uploads (defense in depth)
#   • SSL is added later by Certbot — this file starts plain HTTP only.
server {
    listen 80;
    listen [::]:80;
    server_name nexgear.my.id www.nexgear.my.id;

    root /var/www/nexgear-store/public;
    index index.php index.html;

    # Generous body size for image uploads in admin
    client_max_body_size 10M;

    # Gzip text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Hide server signature
    server_tokens off;

    # CodeIgniter pretty URLs — front-controller fallback
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP execution
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_read_timeout 60s;
    }

    # Belt-and-braces: never execute PHP from inside the upload tree.
    location ~* /uploads/.*\.(?:php|phtml|php\d|pl|py|cgi|sh)$ {
        deny all;
    }

    # Static asset caching (CSS/JS/images/fonts).
    # asset_url() helper appends ?v=<hash> so URLs change on deploy — safe
    # to use a 1-year immutable cache here.
    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # PWA assets must always be revalidated — override the generic rule above.
    location ~* (manifest\.webmanifest|service-worker\.js)$ {
        expires off;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Block hidden files (.env, .git, etc.) — even though they live outside
    # the document root, this is a hard guarantee.
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Don't log favicon/robots noise
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
